<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sabir BERTIT — Python Backend Developer specializing in clean architecture, scalable APIs and event-driven systems.">
  <title>Sabir BERTIT — Python Backend Developer</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <ul>
    <li><a href="#skills"     data-en="Skills"      data-fr="Compétences">Skills</a></li>
    <li><a href="#experience" data-en="Experience"   data-fr="Expériences">Experience</a></li>
    <li><a href="#education"  data-en="Education"    data-fr="Formation">Education</a></li>
    <li><a href="#about"      data-en="About"        data-fr="À Propos">About</a></li>
    <li><a href="#contact"    data-en="Contact"      data-fr="Contact">Contact</a></li>
    <li class="lang-switcher">
      <button class="lang-btn active" id="btn-en"
              hx-get="/lang/en/content.html"
              hx-target="#content"
              hx-swap="innerHTML"
              hx-on::after-request="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-fr"
              hx-get="/lang/fr/content.html"
              hx-target="#content"
              hx-swap="innerHTML"
              hx-on::after-request="setLang('fr')">FR</button>
    </li>
    <li><a href="/BERTIT-SABIR-CV.pdf" target="_blank" class="nav-cv">↓ CV</a></li>
  </ul>
</nav>

<!-- ── MAIN CONTENT ──
     Loads English content on first visit via hx-trigger="load".
     Language buttons swap the full innerHTML of this element. ── -->
<main id="content"
      hx-get="/lang/en/content.html"
      hx-trigger="load"
      hx-swap="innerHTML">
  <div class="page-loader">
    <div class="page-loader__spinner"></div>
  </div>
</main>

<!-- ── FOOTER ── -->
<footer>
  <p>Sabir BERTIT · Nanterre, France · <a href="mailto:sabir-bertit@hotmail.fr">sabir-bertit@hotmail.fr</a></p>
  <p>Built with HTML, CSS &amp; HTMX · Hosted on GitHub Pages</p>
</footer>

</body>
</html>
